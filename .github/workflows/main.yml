name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Projekt entpacken
        run: echo '' | base64 -d | tar xz

      - name: JDK 17 einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK einrichten
        uses: android-actions/setup-android@v3

      - name: Gradle einrichten
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Bauen (mit Protokoll)
        run: |
          set -o pipefail
          {
            echo "### sdkmanager ###"
            yes | sdkmanager --licenses >/dev/null 2>&1 || true
            sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
            echo "### gradle assembleDebug ###"
            gradle assembleDebug --no-daemon --stacktrace
          } 2>&1 | tee build-log.txt

      - name: Protokoll hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt

      - name: APK hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calwatch-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: ignore
